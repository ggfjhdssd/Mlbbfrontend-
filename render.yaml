services:
  - type: web
    name: mlbb-matchmaking-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: BOT_TOKEN
        sync: false          # BotFather token
      - key: FRONTEND_URL
        value: https://mlbbfrontend.vercel.app
      - key: ADMIN_URL
        value: https://mlbbadmin.vercel.app   # Where admin.html is deployed
      - key: ADMIN_ID
        sync: false          # Your personal Telegram numeric ID
      - key: ADMIN_SECRET
        sync: false          # Secret key for admin API calls
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
